# FILE: .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000']

  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/PyCQA/flake8
    # >=7.1 needed on Python 3.12: older pycodestyle tokenizes inside
    # f-strings (PEP 701) and false-positives E221/E702/E713 on them
    rev: 7.1.1
    hooks:
      - id: flake8
        # E203: whitespace before ':' — conflicts with black's slice style
        args: ['--extend-ignore=E501,E231,E402,E203']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.4.1
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--explicit-package-bases"]
        additional_dependencies: [types-PyYAML]

  # Fast unit tier gate: the pure-python/pinocchio tests run in ~2 s, so
  # they're cheap enough to guard every commit (integration/system tiers
  # are too slow/heavy for a hook — run them via `make`).
  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests (make test-unit)
        entry: make test-unit
        language: system
        pass_filenames: false
