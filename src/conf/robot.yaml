PORT_ID_0: "/dev/ttyACM0"
PORT_ID_1: "/dev/ttyACM1"
ROBOT_NAME_0: "follower_0"
ROBOT_NAME_1: "follower_1"

# Used by move_to_norm_pose to map [-1.0, 1.0] inputs to safe degrees.
# Format: [min_degree, max_degree]
joint_limits_deg:
  shoulder_pan: [-180.0, 180.0]
  shoulder_lift: [-180.0, 180.0]
  elbow_flex: [-180.0, 180.0]
  wrist_flex: [-180.0, 180.0]
  wrist_roll: [-180.0, 180.0]
  gripper: [0.0, 100.0] # Gripper operates on a 0-100 scale
